<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>toctoc</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚪</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>toctoc</h1>
    <span class="meta" id="whoami"></span>
    <input type="color" id="mycolor" class="swatch hidden" title="tu color" />
  </header>

  <!-- pantalla de login -->
  <main id="login" class="login hidden">
    <div class="card">
      <h2>toctoc</h2>
      <p class="meta">¿quién eres? (sin contraseña por ahora)</p>
      <input id="loginName" type="text" placeholder="tu nombre" maxlength="25" autocomplete="off" />
      <button id="loginBtn">entrar</button>
    </div>
  </main>

  <!-- app: barra lateral de chats + conversación -->
  <main id="app" class="app hidden">
    <aside id="sidebar">
      <form id="newchat" autocomplete="off">
        <input id="newchatName" type="text" placeholder="hablar con…" maxlength="25" />
        <button type="submit">toc</button>
      </form>
      <ul id="chatlist"></ul>
    </aside>

    <section id="conv">
      <div id="empty">elige un chat o empieza uno nuevo</div>
      <div id="convhead" class="hidden"></div>
      <ul id="messages" class="hidden"></ul>
      <form id="composer" class="hidden" autocomplete="off">
        <input id="body" type="text" placeholder="escribe…" maxlength="1000" />
        <button type="submit">enviar</button>
      </form>
    </section>
  </main>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
